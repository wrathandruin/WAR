# WAR environment profile
environment_name=hosted_internal_alpha
config_identity=hosted-internal-alpha-baseline
description=Hosted internal alpha bootstrap lane with explicit deployable environment profile ownership.
connect_target_policy=internal-alpha-lan
transport_policy=file-backed-hosted-bootstrap
runtime_root_policy=hosted-internal-alpha-runtime-root
requires_secrets=yes
required_secret_keys=bootstrap_shared_key,telemetry_hmac_salt
default_secrets_file=hosted_internal_alpha.secrets.cfg
mutable_runtime_config_root=Runtime/Config
mutable_runtime_logs_root=Runtime/Logs
mutable_runtime_saves_root=Runtime/Saves
